name: adaptixc2-omni

# Build context is this directory so the Dockerfile can COPY all four sibling repos.
# Server image and runtime build for the host architecture (no platform pin), so
# Apple Silicon hosts produce arm64 images natively without QEMU emulation. Windows
# artifacts inside the image are still cross-compiled to x86/x64 PE regardless of
# host arch. To force a specific arch, set DOCKER_DEFAULT_PLATFORM=linux/amd64.

services:
  builder:
    profiles: ["build"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: adaptixc2-omni:latest
    container_name: adaptixc2-omni-builder
    command: ["true"]

  server:
    profiles: ["runtime"]
    image: adaptixc2-omni:latest
    container_name: adaptixc2-omni-server
    network_mode: host
    volumes:
      # The runtime profile (./data/profile.yaml) is rendered by the entrypoint
      # on first start. Edit it there and `restart` to apply changes.
      - ./data:/app/data
    environment:
      - TZ=${TZ:-UTC}
      # Override credentials by uncommenting and setting before first start.
      # See README.md for ADAPTIX_OPERATORS format.
      # - ADAPTIX_TEAMSERVER_PASSWORD=
      # - ADAPTIX_OPERATORS=operator1:secret1,operator2:secret2
    restart: unless-stopped

  # Linux AppImage build. Reuses AdaptixC2/Dockerfile's build-client stage as-is
  # (Qt 6.9.2 via aqtinstall, ubuntu:22.04, linuxdeployqt + appimagetool).
  # Pinned linux/amd64 because the AppImage target is x86_64 by definition;
  # builds under QEMU on arm64 hosts.
  client-linux:
    profiles: ["build-client"]
    platform: linux/amd64
    build:
      context: ./AdaptixC2
      dockerfile: Dockerfile
      target: build-client
      platforms:
        - linux/amd64
    image: adaptixc2-omni-client-linux-builder:latest
    container_name: adaptixc2-omni-client-linux-builder
    volumes:
      - ./AdaptixClient-dist:/client-dist-output
    command: sh -c "cp -r /client-dist/. /client-dist-output/"
