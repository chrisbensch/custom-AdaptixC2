name: adaptixc2-omni

# Build context is this directory so the Dockerfile can COPY all four sibling repos.
# Server image and runtime build for the host architecture (no platform pin), so
# Apple Silicon hosts produce arm64 images natively without QEMU emulation. Windows
# artifacts inside the image are still cross-compiled to x86/x64 PE regardless of
# host arch. To force a specific arch, set DOCKER_DEFAULT_PLATFORM=linux/amd64.

services:
  builder:
    profiles: ["build"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: adaptixc2-omni:latest
    container_name: adaptixc2-omni-builder
    command: ["true"]

  server:
    profiles: ["runtime"]
    image: adaptixc2-omni:latest
    container_name: adaptixc2-omni-server
    network_mode: host
    volumes:
      # The runtime profile (./data/profile.yaml) is rendered by the entrypoint
      # on first start. Edit it there and `restart` to apply changes.
      - ./data:/app/data
    environment:
      - TZ=${TZ:-UTC}
      # Override credentials by uncommenting and setting before first start.
      # See README.md for ADAPTIX_OPERATORS format.
      # - ADAPTIX_TEAMSERVER_PASSWORD=
      # - ADAPTIX_OPERATORS=operator1:secret1,operator2:secret2
    restart: unless-stopped

  # Linux AppImage build. Drives one of two AdaptixC2/Dockerfile stages:
  #   amd64 → build-client       (ubuntu:22.04 + aqtinstall Qt 6.9.2 + linuxdeployqt)
  #   arm64 → build-client-kali  (kali-rolling + distro Qt 6.10.2 + linuxdeploy)
  # The arm64 path exists because aqtinstall publishes no Linux aarch64 Qt
  # binaries; Kali's distro Qt6 fills the gap. The kali stage is added by
  # patches/adaptixclient-kali-arm64-stage.patch (applied by scripts/build-client-linux.sh).
  # Defaults reproduce the original amd64 path; scripts/build-client-linux.sh sets the
  # ADAPTIX_CLIENT_* env vars when --arch arm64 is requested.
  client-linux:
    profiles: ["build-client"]
    platform: ${ADAPTIX_CLIENT_PLATFORM:-linux/amd64}
    build:
      context: ./AdaptixC2
      dockerfile: Dockerfile
      target: ${ADAPTIX_CLIENT_TARGET:-build-client}
      platforms:
        - ${ADAPTIX_CLIENT_PLATFORM:-linux/amd64}
      args:
        IMG_ARCH: ${ADAPTIX_CLIENT_IMG_ARCH:-x86_64}
    image: adaptixc2-omni-client-linux-builder:${ADAPTIX_CLIENT_ARCH:-amd64}
    container_name: adaptixc2-omni-client-linux-builder-${ADAPTIX_CLIENT_ARCH:-amd64}
    volumes:
      - ./AdaptixClient-dist:/client-dist-output
    command: sh -c "cp -r /client-dist/. /client-dist-output/"
